name: Bullion Price Scraper

on:
  schedule:
    # Every 3 hours UTC — 8 runs/day covering all Australian business hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run all dealer scrapers
        run: python push_all.py