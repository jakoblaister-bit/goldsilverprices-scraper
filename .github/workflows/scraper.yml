name: Bullion Price Scraper

on:
  # Primary trigger: cron-job.org calls the GitHub API (workflow_dispatch) every 3 hours
  # at exactly 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC.
  # This avoids GitHub's queuing delays on scheduled jobs.
  workflow_dispatch:

  # Fallback: GitHub's own scheduler runs once daily at midnight UTC.
  # Catches the rare case where cron-job.org misses a window.
  schedule:
    - cron: '0 0 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all dealer scrapers
        run: python push_all.py